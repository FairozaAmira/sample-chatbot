name: CI-CD

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          pip install uv

      - name: Install dependencies
        run: |
          uv pip install --system .[dev]

      - name: Run tests
        run: |
          pytest --maxfail=1 --disable-warnings -q

  deploy-uat:
    name: Deploy UAT
    runs-on: ubuntu-latest
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/') && endsWith(github.ref_name, '-uat')
    environment: uat

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image for UAT
        run: |
          docker build -t enterprise-chatbot:${{ github.ref_name }} .

      - name: Sample UAT deployment
        run: |
          echo "Deploying to UAT with tag ${{ github.ref_name }}"
          echo "Example tag format: 0.0.1-uat"

  deploy-prod:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/') && endsWith(github.ref_name, '-prod')
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image for Production
        run: |
          docker build -t enterprise-chatbot:${{ github.ref_name }} .

      - name: Sample production deployment
        run: |
          echo "Deploying to Production with tag ${{ github.ref_name }}"
          echo "Example tag format: 0.0.1-prod"
